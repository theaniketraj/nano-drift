name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Assemble the site:
      #   landing/* → _site/          (HTML, CSS, JS, SW, manifest, favicon …)
      #   docs/*    → _site/docs/     (Markdown files fetched at runtime by JS)
      #   .nojekyll → _site/          (prevents Jekyll processing on GH Pages)
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r landing/. _site/
          cp -r docs _site/docs
          # Ensure jekyll is disabled at the GH Pages root
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
